<!doctype html>
<html lang="en-IN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <meta name="color-scheme" content="light dark" />
  <meta name="format-detection" content="telephone=no,address=no,email=no" />
  <meta http-equiv="x-dns-prefetch-control" content="on" />

  <!-- Tightened CSP: 'unsafe-inline' removed from script-src (theme bootstrap is now
       in /theme-bootstrap.js). style-src keeps 'unsafe-inline' for Tailwind/framer-motion
       inline styles; revisit when moving to a nonce/hash setup. -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://assets.calendly.com https://calendly.com https://apis.google.com https://accounts.google.com https://www.google-analytics.com https://www.googletagmanager.com https://js.stripe.com https://connect.facebook.net https://cdn.segment.io https://cdn.pendo.io https://data.pendo.io https://js.appboycdn.com https://cdn.sprig.com https://cdn.cookielaw.org https://challenges.cloudflare.com https://static.cloudflareinsights.com https://www.youtube.com https://www.youtube-nocookie.com https://s.ytimg.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://assets.calendly.com;
    font-src 'self' data: https://fonts.gstatic.com;
    img-src 'self' data: https: blob:;
    frame-src 'self' https://calendly.com https://js.stripe.com https://hooks.stripe.com https://www.youtube.com https://www.youtube-nocookie.com https://youtube.com;
    connect-src 'self' https://shinel-auth.shinelstudioofficial.workers.dev https://www.youtube.com https://youtube.googleapis.com https://www.google-analytics.com https://api.ipify.org;
    worker-src 'self' blob:;
  ">

  <!-- DNS Prefetch (pairs with preconnects) -->
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://calendly.com">
  <link rel="dns-prefetch" href="https://www.youtube.com">
  <link rel="dns-prefetch" href="https://i.ytimg.com">

  <!-- Preconnects (perf) -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://calendly.com"><!-- Calendly iframe -->

  <!-- Fonts (async loading with display=swap for better performance) -->
  <!-- Note: Removed specific font file preloads to avoid "unused preload" warnings -->
  <!-- DNS prefetch + preconnect + async loading is sufficient for optimal performance -->
  <!-- Fonts load normally (render-blocking for a few ms). The older `media="print"
       + onload="this.media='all'"` trick is a CSP violation under the tightened
       script-src (inline event handlers count as inline script). The preconnect
       above + display=swap below keep this fast. -->
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">
  </noscript>

  <!-- Favicons -->
  <!-- 1) System-controlled (fallback when JS is disabled) -->
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-light-16x16.png" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-light-32x32.png" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-dark-16x16.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-dark-32x32.png" media="(prefers-color-scheme: dark)">

  <!-- 2) JS-controlled (for live theme toggles) -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-light-32x32.png" data-theme="light">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-dark-32x32.png" data-theme="dark">

  <!-- 3) Single tag we also update as a universal fallback -->
  <link id="favicon" rel="icon" type="image/png" href="/favicon-light-32x32.png" />

  <!-- Apple touch icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <!-- Theme colors (system). JS also sets the plain theme-color at runtime. -->
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0F0F0F" media="(prefers-color-scheme: dark)">

  <!-- PWA niceties (optional) -->
  <!-- <link rel="manifest" href="/site.webmanifest"> -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- SEO & Social (Managed by MetaTags.jsx) -->
  <title>Shinel Studios</title>
  <meta name="robots" content="index, follow">

  <!-- Staging safety: uncomment to avoid indexing on previews -->
  <!-- <meta name="robots" content="noindex,nofollow"> -->
</head>

<body>
  <!-- Pre-paint theme bootstrap. Externalized so CSP can drop 'unsafe-inline'. -->
  <script src="/theme-bootstrap.js"></script>

  <noscript>
    <strong>Shinel Studios</strong> requires JavaScript for the best experience.
    Please enable it to view our work, pricing and booking.
  </noscript>

  <div id="root"></div>

  <!-- Subscriber counts are rendered from useClientStats() (live worker data). The old
       window.SS_SUBS inline block was removed as part of the CSP hardening. -->

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
