name: Playwright smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel previous runs on the same PR — only the latest commit matters.
concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Chromium + WebKit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run smoke suite
        env:
          # Optional: when these secrets are set on the repo, the admin
          # spec runs end-to-end (real login against the dedicated test
          # user in KV). When missing, those tests are skipped so PRs
          # from forks still run the public surfaces cleanly.
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: npx playwright test --reporter=github,list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
